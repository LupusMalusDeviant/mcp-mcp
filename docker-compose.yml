# MCP-MCP Gateway — Standard: SQLite (Zero-Setup, ein Volume).
#
#   docker compose up -d
#
# Für PostgreSQL die Override-Datei dazunehmen (startet die DB mit und wartet auf sie):
#
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d
#
# Bewusst ohne Compose-Profile: ein 'depends_on' auf einen nur im Profil aktiven Service
# lässt den Default-Pfad je nach Compose-Version scheitern.

services:
  mcpmcp:
    build: .
    image: mcpmcp:latest
    ports:
      - "8080:8080"
    volumes:
      - mcpmcp-data:/data
    environment:
      ASPNETCORE_URLS: http://+:8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "dotnet", "McpMcp.Server.dll", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  mcpmcp-data:
