# Override für PostgreSQL statt SQLite:
#
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d
#
# Vor dem ersten Start das Passwort ersetzen — an BEIDEN Stellen.

services:
  mcpmcp:
    environment:
      MCPMCP_DB_PROVIDER: postgres
      MCPMCP_DB_CONNECTION: "Host=db;Database=mcpmcp;Username=mcpmcp;Password=CHANGE_ME"
    depends_on:
      db:
        # Auf den Healthcheck warten, nicht nur auf den Start: der Gateway legt beim Hochfahren
        # das Schema an und würde gegen eine noch nicht annehmende Datenbank scheitern.
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mcpmcp
      POSTGRES_USER: mcpmcp
      POSTGRES_PASSWORD: CHANGE_ME
    volumes:
      - mcpmcp-pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcpmcp -d mcpmcp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mcpmcp-pgdata:
